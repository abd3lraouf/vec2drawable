<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g fill="red" stroke="blue">
    <!-- Inherits red / blue -->
    <path d="M10 10 h 50 v 50" />
    
    <!-- Overrides fill and stroke -->
    <path fill="rgb(0, 255, 0)" stroke="#123" d="M10 10 h 50 v 50" />
    
    <!-- Transparent and none -->
    <path fill="transparent" stroke="none" d="M10 10 h 50 v 50" />

    <g fill="#AABBCC">
      <!-- Nested inherit -->
      <path d="M10 10 h 50 v 50" />
    </g>
  </g>
</svg>
